<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Becas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Sistema de Becas</span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">Gestión de Becas</h1>

    <div class="text-center mb-4">
        <img src="assets/img/imagen.png" class="img-fluid rounded shadow" width="250">
    </div>

    <!-- BUSCAR -->
    <div class="card p-3 mb-4 shadow">
        <h5>Buscar Beca por ID</h5>
        <div class="row g-2">
            <div class="col-md-4">
                <input type="number" id="buscarId" class="form-control">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="buscarBeca()">Buscar</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-secondary w-100" onclick="cargarBecas()">Ver todas</button>
            </div>
        </div>
    </div>

    <!-- FORMULARIO COMPLETO -->
    <div class="card p-4 mb-4 shadow">
        <h4>Agregar Beca</h4>
        <div class="row g-2">

            <div class="col-md-3">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre">
            </div>

            <div class="col-md-2">
                <input type="number" id="monto" class="form-control" placeholder="Monto Total">
            </div>

            <div class="col-md-2">
                <input type="number" id="mensualidad" class="form-control" placeholder="Mensualidad">
            </div>

            <div class="col-md-2">
                <input type="number" id="duracion" class="form-control" placeholder="Duración (meses)">
            </div>

            <div class="col-md-2">
                <input type="text" id="periodicidad" class="form-control" placeholder="Periodicidad">
            </div>

            <div class="col-md-1">
                <input type="text" id="estado" class="form-control" placeholder="Estado">
            </div>

            <div class="col-md-12 mt-2">
                <button class="btn btn-success w-100" onclick="agregarBeca()">Guardar</button>
            </div>

        </div>
    </div>

    <!-- TABLA -->
    <table class="table table-hover shadow">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Monto</th>
            <th>Mensualidad</th>
            <th>Duración</th>
            <th>Periodicidad</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tabla-becas"></tbody>
    </table>

</div>

<!-- MODAL COMPLETO -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Editar Beca</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input type="hidden" id="editId">

                <input type="text" id="editNombre" class="form-control mb-2" placeholder="Nombre">

                <input type="number" id="editMonto" class="form-control mb-2" placeholder="Monto">

                <input type="number" id="editMensualidad" class="form-control mb-2" placeholder="Mensualidad">

                <input type="number" id="editDuracion" class="form-control mb-2" placeholder="Duración">

                <input type="text" id="editPeriodicidad" class="form-control mb-2" placeholder="Periodicidad">

                <input type="text" id="editEstado" class="form-control" placeholder="Estado">

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="guardarEdicion()">Guardar cambios</button>
            </div>

        </div>
    </div>
</div>

<script src="js/becas.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
