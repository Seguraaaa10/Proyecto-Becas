<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alumnos - Sistema de Becas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand">Sistema de Becas - Alumnos</span>
    </div>
</nav>

<div class="container mt-5">

    <h1 class="text-center mb-4">Gestión de Alumnos</h1>

    <!-- IMAGEN -->
    <div class="text-center mb-4">
        <img src="assets/img/imagen.png" class="img-fluid rounded shadow" width="250">
    </div>

    <!-- FORM -->
    <div class="card p-4 mb-4 shadow">
        <h4>Agregar Alumno</h4>
        <div class="row g-2">

            <div class="col-md-3">
                <input type="text" id="nombre" class="form-control" placeholder="Nombre">
            </div>

            <div class="col-md-3">
                <input type="text" id="matricula" class="form-control" placeholder="Matrícula">
            </div>

            <div class="col-md-3">
                <input type="text" id="carrera" class="form-control" placeholder="Carrera">
            </div>

            <div class="col-md-2">
                <input type="number" id="promedio" class="form-control" placeholder="Promedio">
            </div>

            <div class="col-md-1">
                <button class="btn btn-success w-100" onclick="agregarAlumno()">Guardar</button>
            </div>

        </div>
    </div>

    <!-- BUSCAR -->
    <div class="card p-3 mb-4 shadow">
        <h5>Buscar Alumno por ID</h5>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="number" id="buscarId" class="form-control" placeholder="ID">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="buscarAlumno()">Buscar</button>
            </div>
            <div class="col-md-2">
                <button class="btn btn-secondary w-100" onclick="cargarAlumnos()">Mostrar Todos</button>
            </div>
        </div>
    </div>

    <!-- TABLA -->
    <table class="table table-hover shadow">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Matrícula</th>
            <th>Carrera</th>
            <th>Promedio</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody id="tabla-alumnos"></tbody>
    </table>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Editar Alumno</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="editId">
                <input type="text" id="editNombre" class="form-control mb-2" placeholder="Nombre">
                <input type="text" id="editMatricula" class="form-control mb-2" placeholder="Matrícula">
                <input type="text" id="editCarrera" class="form-control mb-2" placeholder="Carrera">
                <input type="number" id="editPromedio" class="form-control" placeholder="Promedio">
            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="guardarEdicion()">Guardar cambios</button>
            </div>

        </div>
    </div>
</div>

<script src="js/alumnos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
